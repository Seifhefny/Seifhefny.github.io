<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seif Hefny — Developer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --bg2: #111111; --bg3: #1a1a1a;
      --fg: #f2f0ec; --fg2: #9a9690;
      --accent: oklch(0.72 0.19 55);
      --border: rgba(242,240,236,0.08);
      --font-sans: 'Space Grotesk', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--fg); font-family: var(--font-sans); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    ::selection { background: var(--accent); color: #000; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(28px); } to { opacity:1; transform:none; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideRight { from { transform:scaleX(0); } to { transform:scaleX(1); } }

    .reveal { opacity:0; transform:translateY(30px); transition:opacity 0.65s ease, transform 0.65s ease; }
    .reveal.visible { opacity:1; transform:none; }

    nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:20px 60px; background:rgba(8,8,8,0.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); transition:padding 0.3s; }
    .nav-logo { font-family:var(--font-mono); font-size:15px; font-weight:700; letter-spacing:0.05em; color:var(--accent); }
    .nav-links { display:flex; gap:36px; list-style:none; }
    .nav-links a { font-size:13px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg2); text-decoration:none; transition:color 0.2s; }
    .nav-links a:hover { color:var(--fg); }

    #hero { min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:120px 60px 80px; position:relative; overflow:hidden; }
    .hero-grid-bg { position:absolute; inset:0; background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px); background-size:60px 60px; mask-image:radial-gradient(ellipse 80% 60% at 50% 50%,black 20%,transparent 100%); pointer-events:none; }
    .hero-eyebrow { display:flex; align-items:center; gap:12px; margin-bottom:24px; animation:fadeIn 0.8s ease both; }
    .hero-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); }
    .hero-label { font-family:var(--font-mono); font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--fg2); }
    .hero-label span { color:var(--accent); }
    .hero-name { font-size:clamp(58px,9vw,130px); font-weight:700; line-height:0.92; letter-spacing:-0.03em; margin-bottom:28px; animation:fadeUp 0.9s ease 0.1s both; }
    .hero-name em { font-style:normal; color:var(--accent); }
    .hero-tagline { font-size:clamp(17px,2vw,24px); font-weight:400; color:var(--fg2); max-width:520px; line-height:1.55; margin-bottom:52px; animation:fadeUp 0.9s ease 0.2s both; }
    .hero-cta { display:flex; gap:16px; flex-wrap:wrap; animation:fadeUp 0.9s ease 0.3s both; }
    .hero-location { margin-top:60px; display:flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:11px; color:var(--fg2); letter-spacing:0.08em; animation:fadeIn 1s ease 0.5s both; }
    .hero-scroll-hint { position:absolute; bottom:36px; left:60px; display:flex; align-items:center; gap:12px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--fg2); animation:fadeIn 1.2s ease 0.8s both; }
    .scroll-line { width:40px; height:1px; background:var(--accent); transform-origin:left; animation:slideRight 0.8s ease 1s both; }

    .btn-primary { display:inline-flex; align-items:center; gap:8px; background:var(--accent); color:#000; font-family:var(--font-sans); font-size:14px; font-weight:600; letter-spacing:0.04em; padding:14px 28px; border:none; cursor:pointer; text-decoration:none; transition:opacity 0.2s, transform 0.2s; }
    .btn-primary:hover { opacity:0.88; transform:translateY(-1px); }
    .btn-outline { display:inline-flex; align-items:center; gap:8px; background:transparent; color:var(--fg); font-family:var(--font-sans); font-size:14px; font-weight:500; letter-spacing:0.04em; padding:14px 28px; border:1px solid var(--border); cursor:pointer; text-decoration:none; transition:border-color 0.2s, transform 0.2s; }
    .btn-outline:hover { border-color:rgba(242,240,236,0.3); transform:translateY(-1px); }

    section.content { padding:100px 60px; max-width:1200px; margin:0 auto; }
    .section-label { font-family:var(--font-mono); font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--accent); margin-bottom:14px; }
    .section-title { font-size:clamp(32px,4vw,52px); font-weight:700; letter-spacing:-0.025em; line-height:1.05; margin-bottom:56px; }
    .section-divider { width:100%; height:1px; background:var(--border); }

    .about-grid { display:grid; grid-template-columns:1.2fr 0.8fr; gap:80px; align-items:start; }
    .about-bio { font-size:17px; line-height:1.8; color:var(--fg2); }
    .about-bio strong { color:var(--fg); font-weight:600; }
    .about-bio p+p { margin-top:18px; }
    .about-fun-fact { margin-top:28px; padding:20px 24px; background:var(--bg2); border-left:2px solid var(--accent); font-size:14px; color:var(--fg2); font-style:italic; line-height:1.6; }
    .about-right { display:flex; flex-direction:column; gap:28px; }
    .about-stats { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .stat-card { background:var(--bg2); border:1px solid var(--border); padding:24px 20px; transition:border-color 0.2s, transform 0.2s; }
    .stat-card:hover { border-color:rgba(242,240,236,0.2); transform:translateY(-2px); }
    .stat-num { font-size:38px; font-weight:700; letter-spacing:-0.04em; color:var(--accent); line-height:1; margin-bottom:6px; }
    .stat-label { font-size:12px; color:var(--fg2); font-weight:500; }
    .skills-block-label { font-family:var(--font-mono); font-size:10px; letter-spacing:0.15em; text-transform:uppercase; color:var(--fg2); margin-bottom:10px; }
    .skills-list { display:flex; flex-wrap:wrap; gap:8px; }
    .skill-tag { font-family:var(--font-mono); font-size:11px; letter-spacing:0.04em; padding:5px 12px; border:1px solid var(--border); color:var(--fg2); transition:border-color 0.2s, color 0.2s; }
    .skill-tag:hover { border-color:var(--accent); color:var(--fg); }

    .project-card { background:var(--bg2); border:1px solid var(--border); padding:48px; position:relative; overflow:hidden; transition:border-color 0.3s, transform 0.3s; }
    .project-card:hover { border-color:rgba(242,240,236,0.2); transform:translateY(-3px); }
    .project-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,#7c3aed,#a78bfa); transform:scaleX(0); transform-origin:left; transition:transform 0.4s ease; }
    .project-card:hover::before { transform:scaleX(1); }
    .project-layout { display:grid; grid-template-columns:1fr 300px; gap:48px; align-items:start; }
    .project-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px; }
    .project-index { font-family:var(--font-mono); font-size:11px; letter-spacing:0.15em; color:var(--fg2); }
    .project-tags { display:flex; gap:8px; flex-wrap:wrap; }
    .project-tag { font-family:var(--font-mono); font-size:10px; letter-spacing:0.08em; padding:4px 10px; background:rgba(124,58,237,0.1); color:#a78bfa; border:1px solid rgba(124,58,237,0.25); }
    .project-tag.status { background:rgba(242,240,236,0.04); color:var(--fg2); border-color:var(--border); }
    .project-name { font-size:clamp(32px,4vw,52px); font-weight:700; letter-spacing:-0.03em; line-height:1.05; margin-bottom:16px; }
    .project-tagline { font-size:16px; color:var(--accent); font-weight:500; margin-bottom:16px; }
    .project-desc { font-size:15px; line-height:1.75; color:var(--fg2); margin-bottom:32px; }
    .project-links { display:flex; gap:14px; flex-wrap:wrap; }
    .deep-dive-btn { display:inline-flex; align-items:center; gap:8px; font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent); background:none; border:none; border-bottom:1px solid transparent; cursor:pointer; margin-top:20px; padding-bottom:2px; transition:border-color 0.2s; }
    .deep-dive-btn:hover { border-color:var(--accent); }
    .phone-frame { background:#0d0d0d; border:1px solid rgba(255,255,255,0.08); border-radius:36px; overflow:hidden; box-shadow:0 0 80px rgba(124,58,237,0.15), 0 20px 60px rgba(0,0,0,0.6); }
    .phone-notch { height:28px; background:#0d0d0d; display:flex; align-items:center; justify-content:center; border-bottom:1px solid rgba(255,255,255,0.05); }
    .phone-pill { width:80px; height:6px; background:rgba(255,255,255,0.08); border-radius:3px; }
    .phone-screen img { width:100%; display:block; }
    .phone-placeholder { width:100%; aspect-ratio:390/844; background:linear-gradient(160deg,#1a1020 0%,#0d0d18 100%); display:flex; align-items:center; justify-content:center; }
    .phone-placeholder-inner { text-align:center; color:rgba(167,139,250,0.3); font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; }
    .phone-placeholder-icon { font-size:32px; margin-bottom:8px; opacity:0.3; }
    .more-card { border:1px dashed var(--border); padding:40px 48px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; margin-top:24px; }

    .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:80px; }
    .contact-intro { font-size:17px; line-height:1.75; color:var(--fg2); }
    .contact-intro strong { color:var(--fg); }
    .contact-links { display:flex; flex-direction:column; gap:14px; }
    .contact-link { display:flex; align-items:center; justify-content:space-between; padding:18px 22px; background:var(--bg2); border:1px solid var(--border); text-decoration:none; color:var(--fg); transition:border-color 0.2s, transform 0.2s; }
    .contact-link:hover { border-color:rgba(242,240,236,0.28); transform:translateX(4px); }
    .contact-link-left { display:flex; align-items:center; gap:14px; }
    .contact-icon { width:34px; height:34px; background:var(--bg3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; }
    .contact-link-label { font-size:14px; font-weight:600; }
    .contact-link-sub { font-size:12px; color:var(--fg2); margin-top:2px; }

    footer { border-top:1px solid var(--border); padding:28px 60px; display:flex; justify-content:space-between; align-items:center; }
    .footer-copy { font-family:var(--font-mono); font-size:12px; color:var(--fg2); }
    .footer-right { font-family:var(--font-mono); font-size:11px; color:var(--fg2); }
    .footer-right span { color:var(--accent); }

    /* OVERLAY */
    .overlay-back { position:fixed; inset:0; z-index:200; background:transparent; pointer-events:none; transition:background 0.4s; }
    .overlay-back.open { background:rgba(0,0,0,0.65); pointer-events:auto; }
    .overlay-panel { position:fixed; top:0; right:0; bottom:0; width:min(820px,100vw); z-index:201; background:var(--bg); border-left:1px solid var(--border); transform:translateX(100%); transition:transform 0.45s cubic-bezier(0.22,1,0.36,1); overflow-y:auto; }
    .overlay-panel.open { transform:translateX(0); }
    .overlay-panel::-webkit-scrollbar { width:4px; }
    .overlay-panel::-webkit-scrollbar-thumb { background:rgba(167,139,250,0.3); border-radius:2px; }
    .overlay-head { position:sticky; top:0; z-index:10; display:flex; justify-content:space-between; align-items:center; padding:18px 40px; background:rgba(8,8,8,0.95); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
    .overlay-head-title { font-family:var(--font-mono); font-size:13px; font-weight:700; letter-spacing:0.08em; color:#a78bfa; }
    .overlay-close { background:none; border:1px solid var(--border); color:var(--fg2); width:36px; height:36px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:border-color 0.2s; }
    .overlay-close:hover { border-color:rgba(242,240,236,0.3); color:var(--fg); }
    .overlay-body { padding:48px 40px 80px; }
    .o-sec { margin-bottom:52px; }
    .o-lbl { font-family:var(--font-mono); font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:#a78bfa; margin-bottom:10px; }
    .o-ttl { font-size:clamp(20px,3vw,30px); font-weight:700; letter-spacing:-0.02em; margin-bottom:24px; }
    .o-g2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .o-card { background:var(--bg2); border:1px solid var(--border); padding:22px; transition:border-color 0.2s; }
    .o-card:hover { border-color:rgba(167,139,250,0.3); }
    .o-card-icon { font-size:22px; margin-bottom:10px; }
    .o-card-title { font-size:14px; font-weight:700; margin-bottom:7px; }
    .o-card-desc { font-size:13px; color:var(--fg2); line-height:1.65; }
    .o-flow { display:flex; flex-direction:column; }
    .o-step { display:grid; grid-template-columns:48px 1fr; position:relative; }
    .o-step-line { position:absolute; left:23px; top:48px; bottom:0; width:2px; background:linear-gradient(to bottom,rgba(167,139,250,0.35),transparent); }
    .o-step-num { width:48px; height:48px; display:flex; align-items:center; justify-content:center; font-family:var(--font-mono); font-size:11px; font-weight:700; color:#a78bfa; background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.25); flex-shrink:0; z-index:1; }
    .o-step-body { padding:10px 0 36px 18px; }
    .o-step-title { font-size:15px; font-weight:700; margin-bottom:5px; }
    .o-step-desc { font-size:13px; color:var(--fg2); line-height:1.65; }
    .o-badge { display:inline-block; margin-top:7px; font-family:var(--font-mono); font-size:10px; padding:3px 8px; background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.25); color:#a78bfa; }
    .o-arch { display:flex; flex-direction:column; gap:12px; }
    .o-arch-card { background:var(--bg2); border:1px solid var(--border); padding:22px; position:relative; overflow:hidden; }
    .o-arch-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:#a78bfa; opacity:0.35; }
    .o-arch-layer { font-family:var(--font-mono); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:#a78bfa; margin-bottom:8px; }
    .o-arch-name { font-size:15px; font-weight:700; margin-bottom:8px; }
    .o-arch-desc { font-size:13px; color:var(--fg2); line-height:1.65; }
    .o-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .o-tag { font-family:var(--font-mono); font-size:10px; padding:3px 8px; background:rgba(242,240,236,0.04); border:1px solid var(--border); color:var(--fg2); }
    .o-ai-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .o-ai-card { background:var(--bg2); border:1px solid var(--border); padding:20px; }
    .o-ai-fn { font-family:var(--font-mono); font-size:11px; color:#a78bfa; margin-bottom:7px; }
    .o-ai-title { font-size:14px; font-weight:700; margin-bottom:5px; }
    .o-ai-desc { font-size:12px; color:var(--fg2); line-height:1.6; }
    .o-adhd { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .o-adhd-item { display:flex; gap:12px; align-items:flex-start; padding:18px; background:var(--bg2); border:1px solid var(--border); }
    .o-adhd-dot { width:7px; height:7px; border-radius:50%; background:#a78bfa; flex-shrink:0; margin-top:4px; }
    .o-adhd-title { font-size:13px; font-weight:700; margin-bottom:4px; }
    .o-adhd-desc { font-size:12px; color:var(--fg2); line-height:1.55; }
    .o-roadmap { display:flex; flex-direction:column; gap:10px; }
    .o-roadmap-item { display:flex; align-items:flex-start; gap:14px; padding:18px; background:var(--bg2); border:1px solid var(--border); }
    .o-rm-status { font-family:var(--font-mono); font-size:9px; padding:4px 8px; white-space:nowrap; flex-shrink:0; }
    .o-rm-next { background:rgba(167,139,250,0.1); border:1px solid rgba(167,139,250,0.25); color:#a78bfa; }
    .o-rm-planned { background:rgba(242,240,236,0.04); border:1px solid var(--border); color:var(--fg2); }
    .o-roadmap-title { font-size:14px; font-weight:600; margin-bottom:4px; }
    .o-roadmap-desc { font-size:12px; color:var(--fg2); line-height:1.55; }
    .o-phone-hero { display:flex; justify-content:center; margin-bottom:32px; }
    .o-phone { width:200px; background:#0d0d0d; border:1px solid rgba(255,255,255,0.07); border-radius:30px; overflow:hidden; box-shadow:0 0 60px rgba(124,58,237,0.2),0 20px 40px rgba(0,0,0,0.6); }
    .o-phone-notch { height:22px; background:#0a0a0a; display:flex; align-items:center; justify-content:center; }
    .o-phone-pill { width:56px; height:4px; background:rgba(255,255,255,0.07); border-radius:2px; }
    .o-phone-screen img { width:100%; display:block; }
    .o-gh-btn { display:inline-flex; align-items:center; gap:8px; background:#a78bfa; color:#000; font-family:var(--font-sans); font-size:14px; font-weight:600; padding:13px 26px; border:none; cursor:pointer; text-decoration:none; transition:opacity 0.2s; }
    .o-gh-btn:hover { opacity:0.88; }

    /* TWEAKS */
    .tweaks-panel { position:fixed; bottom:24px; right:24px; width:240px; background:var(--bg2); border:1px solid rgba(242,240,236,0.15); padding:20px; z-index:999; display:none; }
    .tweaks-panel.open { display:block; }
    .tweaks-title { font-size:11px; font-weight:700; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
    .tweak-row { margin-bottom:14px; }
    .tweak-lbl { font-size:10px; color:var(--fg2); margin-bottom:8px; letter-spacing:0.08em; text-transform:uppercase; }
    .tweak-opts { display:flex; gap:6px; flex-wrap:wrap; }
    .tweak-btn { font-size:11px; padding:5px 10px; background:var(--bg3); border:1px solid var(--border); color:var(--fg2); cursor:pointer; font-family:var(--font-mono); transition:border-color 0.2s, color 0.2s; }
    .tweak-btn.active { border-color:var(--accent); color:var(--accent); }

    @media (max-width:900px) {
      nav { padding:16px 24px; }
      .nav-links { display:none; }
      #hero { padding:100px 24px 60px; }
      section.content { padding:64px 24px; }
      .about-grid, .contact-grid { grid-template-columns:1fr; gap:40px; }
      .project-layout { grid-template-columns:1fr; }
      .project-phone-col { display:none; }
      .project-card { padding:28px 24px; }
      footer { padding:20px 24px; flex-direction:column; gap:8px; text-align:center; }
      .hero-scroll-hint { display:none; }
      .overlay-panel { width:100vw; }
      .overlay-body { padding:28px 18px 60px; }
      .o-g2, .o-ai-grid, .o-adhd { grid-template-columns:1fr; }
    }
  </style>
<template id="__bundler_thumbnail" data-bg-color="#080808">
  <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
    <rect width="400" height="300" fill="#080808"/>
    <text x="200" y="140" font-family="monospace" font-size="72" font-weight="700" fill="#f2f0ec" text-anchor="middle" letter-spacing="-3">SH</text>
    <rect x="160" y="158" width="80" height="3" rx="1.5" fill="oklch(0.72 0.19 55)" opacity="0.9"/>
    <text x="200" y="195" font-family="monospace" font-size="13" fill="#9a9690" text-anchor="middle" letter-spacing="4">PORTFOLIO</text>
  </svg>
</template>
</head>

function useReveal() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.08 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

function TweaksPanel() {
  var openState = useState(false);
  var open = openState[0], setOpen = openState[1];
  var tweakState = useState(TWEAK_DEFAULTS);
  var tweaks = tweakState[0], setTweaks = tweakState[1];

  useEffect(function() {
    window.addEventListener('message', function(e) {
      if (e.data && e.data.type === '__activate_edit_mode') setOpen(true);
      if (e.data && e.data.type === '__deactivate_edit_mode') setOpen(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
  }, []);

  function apply(key, val) {
    var next = Object.assign({}, tweaks);
    next[key] = val;
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys', edits: next}, '*');
    if (key === 'accent') {
      var accentMap = {warm:'oklch(0.72 0.19 55)', blue:'oklch(0.72 0.19 240)', green:'oklch(0.72 0.19 155)', purple:'oklch(0.72 0.19 295)'};
      document.documentElement.style.setProperty('--accent', accentMap[val]);
    }
    if (key === 'font') {
      var fontMap = {space:"'Space Grotesk', sans-serif", mono:"'Space Mono', monospace", helvetica:"Helvetica, Arial, sans-serif"};
      document.documentElement.style.setProperty('--font-sans', fontMap[val]);
    }
  }

  if (!open) return null;
  return (
    <div className="tweaks-panel open">
      <div className="tweaks-title">Tweaks</div>
      <div className="tweak-row">
        <div className="tweak-lbl">Accent Color</div>
        <div className="tweak-opts">
          {['warm','blue','green','purple'].map(function(v) {
            return <button key={v} className={"tweak-btn" + (tweaks.accent===v?' active':'')} onClick={function(){ apply('accent',v); }}>{v}</button>;
          })}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-lbl">Font</div>
        <div className="tweak-opts">
          {['space','mono','helvetica'].map(function(v) {
            return <button key={v} className={"tweak-btn" + (tweaks.font===v?' active':'')} onClick={function(){ apply('font',v); }}>{v}</button>;
          })}
        </div>
      </div>
    </div>
  );
}
